<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>HukukApp Admin</title>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --border:#334155; --text:#e2e8f0; --muted:#94a3b8; --accent:#3b82f6; --ok:#10b981; --warn:#f59e0b; --err:#ef4444; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .wrap { max-width:900px; margin:0 auto; padding:24px; }
  h1 { font-size:20px; margin:0 0 4px; }
  h2 { font-size:14px; color:var(--muted); margin:24px 0 12px; text-transform:uppercase; letter-spacing:.08em; font-weight:600; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
  .field { display:flex; flex-direction:column; gap:6px; flex:1; min-width:180px; }
  label { font-size:12px; color:var(--muted); }
  input, select { background:#0f172a; border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:8px; font-size:14px; font-family:inherit; }
  input:focus, select:focus { outline:none; border-color:var(--accent); }
  button { background:var(--accent); color:white; border:0; padding:10px 18px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
  button:hover { filter:brightness(1.1); }
  button:disabled { opacity:.5; cursor:not-allowed; }
  button.ghost { background:transparent; border:1px solid var(--border); }
  button.danger { background:var(--err); }
  .status { padding:10px 14px; border-radius:8px; font-size:13px; margin-top:12px; }
  .status.ok { background:rgba(16,185,129,.1); color:var(--ok); border:1px solid rgba(16,185,129,.3); }
  .status.err { background:rgba(239,68,68,.1); color:var(--err); border:1px solid rgba(239,68,68,.3); }
  .user-info { background:#0f172a; border:1px solid var(--border); padding:14px; border-radius:8px; margin-top:12px; font-size:13px; }
  .user-info div { margin:2px 0; }
  .user-info .k { color:var(--muted); display:inline-block; width:110px; }
  .audit { max-height:400px; overflow-y:auto; }
  .audit-item { padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .audit-item:last-child { border-bottom:0; }
  .stats { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .stat { flex:1; min-width:120px; background:#0f172a; border:1px solid var(--border); padding:14px; border-radius:8px; }
  .stat .num { font-size:22px; font-weight:700; color:var(--text); }
  .stat .lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-top:4px; }
  table.subs { width:100%; border-collapse:collapse; font-size:13px; }
  table.subs th { text-align:left; color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.06em; padding:8px 10px; border-bottom:1px solid var(--border); }
  table.subs td { padding:10px; border-bottom:1px solid var(--border); }
  table.subs tr:hover td { background:rgba(59,130,246,.05); }
  table.subs td.email { max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  table.subs td .srcbadge { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10px; background:#334155; color:var(--muted); }
  .expiry-soon { color:var(--warn); }
  .expiry-expired { color:var(--err); }
  .table-wrap { overflow-x:auto; }
  .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
  .badge.vip { background:#a855f7; color:white; }
  .badge.premium { background:#3b82f6; color:white; }
  .badge.premiumLite { background:#06b6d4; color:white; }
  .badge.free { background:#64748b; color:white; }
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .me { font-size:13px; color:var(--muted); }
  #loginView, #adminView { display:none; }
  #loginView.visible, #adminView.visible { display:block; }
  .login-box { max-width:360px; margin:80px auto; text-align:center; }
</style>
</head>
<body>
<div class="wrap">

  <div id="loginView">
    <div class="card login-box">
      <h1>HukukApp Admin</h1>
      <p style="color:var(--muted); font-size:13px;">Google ile giris yapin.</p>
      <button id="loginBtn" style="margin-top:16px; width:100%;">Google ile Giris</button>
      <div id="loginStatus" class="status" style="display:none;"></div>
    </div>
  </div>

  <div id="adminView">
    <div class="topbar">
      <h1>HukukApp Admin</h1>
      <div>
        <span id="meEmail" class="me"></span>
        <button id="logoutBtn" class="ghost" style="margin-left:12px;">Cikis</button>
      </div>
    </div>

    <div class="card">
      <h2>Kullanici Bul</h2>
      <div class="row">
        <div class="field">
          <label>Email</label>
          <input id="emailInput" type="email" placeholder="kullanici@ornek.com">
        </div>
        <button id="findBtn">Ara</button>
      </div>
      <div id="userInfo" class="user-info" style="display:none;"></div>
      <div id="findStatus" class="status" style="display:none;"></div>
    </div>

    <div class="card">
      <h2>Abonelik Ata</h2>
      <div class="row">
        <div class="field">
          <label>Tip</label>
          <select id="typeSelect">
            <option value="vip">VIP</option>
            <option value="premium">Premium</option>
            <option value="premiumLite">Premium Lite</option>
            <option value="free">Free (kaldir)</option>
          </select>
        </div>
        <div class="field">
          <label>Sure (gun)</label>
          <input id="daysInput" type="number" value="365" min="1" max="3650">
        </div>
        <div class="field" style="flex:2;">
          <label>Aciklama (opsiyonel)</label>
          <input id="reasonInput" type="text" placeholder="promosyon / test / vs">
        </div>
        <button id="grantBtn">Ata</button>
      </div>
      <div id="grantStatus" class="status" style="display:none;"></div>
    </div>

    <div class="card">
      <h2>Aktif Aboneler</h2>
      <div id="statsBox" class="stats">
        <div class="stat"><div class="num" id="statTotal">—</div><div class="lbl">Toplam Aktif</div></div>
        <div class="stat"><div class="num" id="statVip">—</div><div class="lbl">VIP</div></div>
        <div class="stat"><div class="num" id="statPremium">—</div><div class="lbl">Premium</div></div>
        <div class="stat"><div class="num" id="statPremiumLite">—</div><div class="lbl">Premium Lite</div></div>
      </div>
      <div class="row" style="margin-bottom:12px;">
        <div class="field" style="max-width:200px;">
          <label>Filtre</label>
          <select id="subFilter">
            <option value="">Tumu</option>
            <option value="vip">VIP</option>
            <option value="premium">Premium</option>
            <option value="premiumLite">Premium Lite</option>
          </select>
        </div>
        <button id="loadSubsBtn">Listele</button>
        <button id="refreshStatsBtn" class="ghost">Ozeti Yenile</button>
      </div>
      <div class="table-wrap">
        <table class="subs" id="subsTable" style="display:none;">
          <thead>
            <tr>
              <th>Email</th>
              <th>Tip</th>
              <th>Bitis</th>
              <th>Kaynak</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="subsBody"></tbody>
        </table>
      </div>
      <div id="subsStatus" class="status" style="display:none;"></div>
      <button id="loadMoreBtn" class="ghost" style="margin-top:12px; display:none;">Daha Fazla Yukle</button>
    </div>

    <div class="card">
      <h2>Son Islemler</h2>
      <button id="refreshAuditBtn" class="ghost" style="margin-bottom:12px;">Yenile</button>
      <div id="auditList" class="audit"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-functions.js";

const firebaseConfig = {
  projectId: "hukukapp-30760",
  appId: "1:371131654905:web:db91c6cbf10c05c209f828",
  storageBucket: "hukukapp-30760.firebasestorage.app",
  apiKey: "AIzaSyC5LRLgm3XC2O3cJRwONVoRQzEaSxHtnTs",
  authDomain: "hukukapp-30760.firebaseapp.com",
  messagingSenderId: "371131654905",
  measurementId: "G-H2CBY9T3SH"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const functions = getFunctions(app, "us-central1");

const grantSubscription = httpsCallable(functions, "grantSubscription");
const findUserByEmail = httpsCallable(functions, "findUserByEmail");
const listAdminAudit = httpsCallable(functions, "listAdminAudit");
const listActiveSubscribers = httpsCallable(functions, "listActiveSubscribers");
const subscriberStats = httpsCallable(functions, "subscriberStats");

const $ = id => document.getElementById(id);
const show = (el, cls, msg) => { el.style.display = "block"; el.className = "status " + cls; el.textContent = msg; };
const hide = el => { el.style.display = "none"; };

let foundUid = null;

$("loginBtn").onclick = async () => {
  const s = $("loginStatus");
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch (e) {
    show(s, "err", "Giris hatasi: " + (e.message || e.code));
  }
};

$("logoutBtn").onclick = () => signOut(auth);

$("findBtn").onclick = async () => {
  const email = $("emailInput").value.trim();
  const s = $("findStatus");
  const info = $("userInfo");
  hide(s); hide(info);
  foundUid = null;
  if (!email) { show(s, "err", "Email girin"); return; }
  $("findBtn").disabled = true;
  try {
    const res = await findUserByEmail({ email });
    const d = res.data;
    foundUid = d.uid;
    const sub = d.currentSubscription;
    const subType = sub?.type || "free";
    const isActive = sub?.isActive ? "Aktif" : "Pasif";
    const expiry = sub?.expiryTime ? new Date(sub.expiryTime._seconds * 1000).toLocaleString("tr-TR") : "—";
    info.innerHTML = `
      <div><span class="k">UID:</span> <code>${d.uid}</code></div>
      <div><span class="k">Email:</span> ${d.email}</div>
      <div><span class="k">Ad:</span> ${d.displayName || "—"}</div>
      <div><span class="k">Abonelik:</span> <span class="badge ${subType}">${subType}</span> (${isActive})</div>
      <div><span class="k">Bitis:</span> ${expiry}</div>
    `;
    info.style.display = "block";
  } catch (e) {
    show(s, "err", e.message || e.code);
  } finally {
    $("findBtn").disabled = false;
  }
};

$("grantBtn").onclick = async () => {
  const s = $("grantStatus");
  hide(s);
  if (!foundUid) { show(s, "err", "Once kullanici ara"); return; }
  const type = $("typeSelect").value;
  const days = parseInt($("daysInput").value, 10);
  const reason = $("reasonInput").value.trim();
  if (!confirm(`${foundUid}\nkullanicisina ${type} (${days} gun) atanacak. Emin misiniz?`)) return;
  $("grantBtn").disabled = true;
  try {
    const res = await grantSubscription({ targetUid: foundUid, subscriptionType: type, durationDays: days, reason });
    show(s, "ok", `Basarili. Yeni tip: ${res.data.subscriptionType}${res.data.expiryTime ? ", bitis: " + new Date(res.data.expiryTime).toLocaleString("tr-TR") : ""}`);
    loadAudit();
  } catch (e) {
    show(s, "err", e.message || e.code);
  } finally {
    $("grantBtn").disabled = false;
  }
};

async function loadAudit() {
  const list = $("auditList");
  list.innerHTML = '<div style="color:var(--muted); font-size:13px;">Yukleniyor...</div>';
  try {
    const res = await listAdminAudit({});
    const items = res.data.items || [];
    if (items.length === 0) {
      list.innerHTML = '<div style="color:var(--muted); font-size:13px;">Kayit yok.</div>';
      return;
    }
    list.innerHTML = items.map(it => {
      const when = it.at ? new Date(it.at).toLocaleString("tr-TR") : "—";
      return `
        <div class="audit-item">
          <div><span class="badge ${it.subscriptionType}">${it.subscriptionType}</span> ${it.durationDays ? it.durationDays + " gun" : ""} → <code>${it.targetUid}</code></div>
          <div style="color:var(--muted); font-size:12px; margin-top:4px;">${when} · ${it.reason || "—"}</div>
        </div>
      `;
    }).join("");
  } catch (e) {
    list.innerHTML = `<div class="status err" style="margin-top:0;">${e.message || e.code}</div>`;
  }
}

$("refreshAuditBtn").onclick = loadAudit;

// ─── Aktif Aboneler ───

let subsCursor = null;
let subsCurrentFilter = "";

async function loadStats() {
  $("statTotal").textContent = "…";
  $("statVip").textContent = "…";
  $("statPremium").textContent = "…";
  $("statPremiumLite").textContent = "…";
  try {
    const res = await subscriberStats({});
    const d = res.data;
    $("statTotal").textContent = d.totalActive ?? 0;
    $("statVip").textContent = d.byType?.vip ?? 0;
    $("statPremium").textContent = d.byType?.premium ?? 0;
    $("statPremiumLite").textContent = d.byType?.premiumLite ?? 0;
  } catch (e) {
    $("statTotal").textContent = "?";
    $("statVip").textContent = "?";
    $("statPremium").textContent = "?";
    $("statPremiumLite").textContent = "?";
    console.warn("stats hatasi", e);
  }
}

function fmtExpiry(ms) {
  if (!ms) return { txt: "—", cls: "" };
  const now = Date.now();
  const date = new Date(ms).toLocaleDateString("tr-TR");
  const diff = ms - now;
  if (diff < 0) return { txt: date + " (sona erdi)", cls: "expiry-expired" };
  if (diff < 7 * 24 * 60 * 60 * 1000) return { txt: date + " (≤7 gun)", cls: "expiry-soon" };
  return { txt: date, cls: "" };
}

function renderSubsRows(items, append = false) {
  const body = $("subsBody");
  if (!append) body.innerHTML = "";
  for (const it of items) {
    const exp = fmtExpiry(it.expiryTime);
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="email" title="${it.email}">${it.email || "<span style='color:var(--muted)'>email yok</span>"}</td>
      <td><span class="badge ${it.type}">${it.type}</span></td>
      <td class="${exp.cls}">${exp.txt}</td>
      <td><span class="srcbadge">${it.source}</span></td>
      <td><button class="ghost" data-uid="${it.uid}" data-email="${it.email}">Detay</button></td>
    `;
    tr.querySelector("button").onclick = (e) => {
      const email = e.target.getAttribute("data-email");
      if (email) {
        $("emailInput").value = email;
        $("findBtn").click();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    };
    body.appendChild(tr);
  }
}

async function loadSubs(reset = true) {
  const s = $("subsStatus");
  hide(s);
  if (reset) {
    subsCursor = null;
    subsCurrentFilter = $("subFilter").value;
  }
  $("loadSubsBtn").disabled = true;
  $("loadMoreBtn").disabled = true;
  try {
    const payload = { limit: 50 };
    if (subsCurrentFilter) payload.type = subsCurrentFilter;
    if (!reset && subsCursor) payload.cursor = subsCursor;

    const res = await listActiveSubscribers(payload);
    const d = res.data;
    const items = d.items || [];

    $("subsTable").style.display = items.length > 0 || !reset ? "table" : "none";
    renderSubsRows(items, !reset);

    subsCursor = d.nextCursor;
    $("loadMoreBtn").style.display = subsCursor ? "inline-block" : "none";

    if (reset && items.length === 0) {
      show(s, "ok", "Aktif abone yok.");
    }
  } catch (e) {
    show(s, "err", e.message || e.code);
  } finally {
    $("loadSubsBtn").disabled = false;
    $("loadMoreBtn").disabled = false;
  }
}

$("loadSubsBtn").onclick = () => loadSubs(true);
$("loadMoreBtn").onclick = () => loadSubs(false);
$("refreshStatsBtn").onclick = loadStats;
$("subFilter").onchange = () => loadSubs(true);

onAuthStateChanged(auth, user => {
  if (user) {
    $("loginView").classList.remove("visible");
    $("adminView").classList.add("visible");
    $("meEmail").textContent = user.email;
    loadAudit();
    loadStats();
  } else {
    $("adminView").classList.remove("visible");
    $("loginView").classList.add("visible");
  }
});
</script>
</body>
</html>
